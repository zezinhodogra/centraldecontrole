<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseUrl = 'https://ifsrtrmeuwbpypsaaqzi.supabase.co';

// USE A CHAVE ANON PUBLICA DO SUPABASE
const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imlmc3J0cm1ldXdicHlwc2FhcXppIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxNDA0MDQsImV4cCI6MjA5NDcxNjQwNH0.4ZsCE7AxYDqEgc0JZzYMwmBOwv1U-r5-Qv9IsrN_IcE';

// CORRETO
const client = supabase.createClient(supabaseUrl, supabaseKey);

window.addEventListener('load', async () => {
    try {
        const {
            data: { session },
            error
        } = await client.auth.getSession();

        if (error) {
            console.error(error);
            return;
        }

        if (session) {
            window.location.href = 'test.html';
        }
    } catch (err) {
        console.error(err);
    }
});

const form = document.getElementById('loginForm');
const errorMessage = document.getElementById('errorMessage');

form.addEventListener('submit', async (e) => {
    e.preventDefault();

    errorMessage.style.display = 'none';

    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    try {
        const { data, error } = await client.auth.signInWithPassword({
            email,
            password
        });

        if (error) {
            errorMessage.textContent = 'Email ou senha incorretos';
            errorMessage.style.display = 'block';
            errorMessage.style.color = 'red';
            errorMessage.style.textAlign = 'center';
            return;
        }

        console.log('Login realizado', data);

        window.location.href = 'test.html';

    } catch (err) {
        console.error(err);

        errorMessage.textContent = 'Erro inesperado';
        errorMessage.style.display = 'block';
        errorMessage.style.color = 'red';
        errorMessage.style.textAlign = 'center';
    }
});
</script>
