<!-- Supabase JS - WARNING: Using service_role key in frontend is insecure for production! -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  // Initialize Supabase with project URL and service_role key (provided by user)
  // WARNING: This is insecure! Never expose service_role keys in client-side code in production.
  console.log('Initializing Supabase client...');
  const supabaseUrl = 'https://ifsrtrmeuwbpypsaaqzi.supabase.co';
  const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imlmc3J0cm1ldXdicHlwc2FhcXppIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxNDA0MDQsImV4cCI6MjA5NDcxNjQwNH0.4ZsCE7AxYDqEgc0JZzYMwmBOwv1U-r5-Qv9IsrN_IcE';

  let supabase;
  try {
    supabase = supabase.createClient(supabaseUrl, supabaseKey);
    console.log('Supabase client initialized');
  } catch (initError) {
    console.error('Failed to initialize Supabase:', initError);
    alert('Erro ao inicializar autenticação. Verifique a conexão com a internet.');
  }

  // Check if already logged in on page load
  window.addEventListener('load', async () => {
    if (!supabase) {
      console.error('Supabase not initialized');
      return;
    }

    try {
      console.log('Checking session on load...');
      const { data: { session }, error } = await supabase.auth.getSession();
      if (error) {
        console.error('Error getting session on load:', error);
        return;
      }

      console.log('Session data on load:', session);
      if (session) {
        // Already logged in, redirect to test page
        console.log('User already logged in, redirecting to test page');
        window.location.href = 'test.html';
      }
    } catch (err) {
      console.error('Error in session check on load:', err);
    }
  });

  // Handle form submission
  const form = document.getElementById('loginForm');
  const errorMessage = document.getElementById('errorMessage');

  form.addEventListener('submit', (e) => {
    e.preventDefault();
    errorMessage.textContent = '';
    errorMessage.style.display = 'none';

    if (!supabase) {
      errorMessage.textContent = 'Erro de autenticação. Tente novamente.';
      errorMessage.style.display = 'block';
      errorMessage.style.color = 'red';
      errorMessage.style.marginTop = '10px';
      errorMessage.style.textAlign = 'center';
      return;
    }

    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    // Attempt to sign in with email and password
    supabase.auth.signInWithPassword({
      email: email,
      password: password
    })
    .then(({ data, error }) => {
      if (error) {
        // Show error message
        console.log('Login error:', error);
        errorMessage.textContent = 'O E-mail ou Senha estão incorretos';
        errorMessage.style.display = 'block';
        errorMessage.style.color = 'red';
        errorMessage.style.marginTop = '10px';
        errorMessage.style.textAlign = 'center';
      } else {
        // Login successful - redirect to test page
        console.log('Login successful');
        window.location.href = 'test.html';
      }
    })
    .catch(err => {
      console.error('Unexpected error during login:', err);
      errorMessage.textContent = 'Erro inesperado durante o login';
      errorMessage.style.display = 'block';
      errorMessage.style.color = 'red';
      errorMessage.style.marginTop = '10px';
      errorMessage.style.textAlign = 'center';
    });
  });
</script>
